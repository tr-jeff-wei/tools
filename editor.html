<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>程式碼快速編輯器</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    flex-direction:column;
    font-family:Arial,sans-serif;
}

.toolbar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:#f3f4f6;
    border-bottom:1px solid #ddd;
}

.toolbar select,
.toolbar button{
    padding:8px 12px;
    border:1px solid #ccc;
    border-radius:6px;
    cursor:pointer;
}

.toolbar button{
    background:#2563eb;
    color:white;
    border:none;
}

.toolbar button:hover{
    background:#1d4ed8;
}

.toolbar .greyBtn{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#9ca3af;
    color:white;
}
.toolbar .greyBtn:hover{
    background:#6b7280;
}


.container{
    flex:1;
    display:grid;
    grid-template-columns: 2fr 1fr;
    overflow:hidden;
}

#editor{
    height:100%;
}

.sidebar{
    border-left:1px solid #ddd;
    padding:0;
    overflow:hidden;
    background:#fafafa;
    display:flex;
    flex-direction:column;
}

.sidebar h3{
    margin-bottom:0;
}

.tabs{
    display:flex;
    border-bottom:1px solid #ddd;
    background:#f3f4f6;
}

.tab{
    flex:1;
    padding:12px;
    border:none;
    background:transparent;
    cursor:pointer;
    text-align:center;
    font-size:14px;
    border-bottom:3px solid transparent;
    transition:all 0.2s;
}

.tab:hover{
    background:#e5e7eb;
}

.tab.active{
    background:#fafafa;
    border-bottom-color:#2563eb;
    color:#2563eb;
    font-weight:bold;
}

.tab-content{
    display:none;
    padding:15px;
    overflow-y:auto;
    flex:1;
}

.tab-content.active{
    display:block;
}

.snippet-btn{
    width:100%;
    margin-bottom:8px;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#e5e7eb;
    cursor:pointer;
    text-align:left;
}

.snippet-btn:hover{
    background:#d1d5db;
}
</style>
</head>

<body>

<div class="toolbar">
    <label>語言：</label>

    <select id="languageSelect">
        <option value="lua">Lua</option>
        <option value="javascript">JavaScript</option>
        <option value="python">Python</option>
    </select>
    
    <button class="greyBtn" id="undoBtn" onclick="editor.trigger('','undo',null)">
        ↩️ 復原
    </button>
    <button class="greyBtn" id="redoBtn" onclick="editor.trigger('','redo',null)">
        ↪️ 重做
    </button>
    
    <button id="copyBtn">
        📋 複製全部程式碼
    </button>

    <button id="downloadBtn">
        💾 下載程式碼
    </button>

    <button id="clearBtn" onclick="editor.setValue('')">
        🗑️ 清空編輯器
    </button>
    <a href="https://pythontutor.com/visualize.html" target="_blank" style="margin-left:auto; text-decoration:none; color:#2563eb; font-weight:bold;">
        🐍 Python Tutor 測試執行
    </a>
</div>

<div class="container">

    <div id="editor"></div>

    <div class="sidebar">
        <div class="tabs">
            <button class="tab" data-category="flow">流程控制</button>
            <button class="tab" data-category="func">常用功能</button>
            <button class="tab" data-category="data">其他</button>
            <button class="tab active" data-category="all">全部</button>
        </div>
        <div class="tab-content active" id="tab-all"></div>
        <div class="tab-content" id="tab-flow"></div>
        <div class="tab-content" id="tab-func"></div>
        <div class="tab-content" id="tab-data"></div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs/loader.min.js"></script>

<script>

let editor;

require.config({
    paths:{
        vs:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.52.2/min/vs"
    }
});

require(["vs/editor/editor.main"],function(){

    editor = monaco.editor.create(
        document.getElementById("editor"),
        {
            value:"-- 開始撰寫程式...\n",
            language:"lua",
            theme:"vs-dark",
            automaticLayout:true,
            fontSize:16
        }
    );
    editor.setPosition({lineNumber:2, column:1});

});

const languageSelect = document.getElementById("languageSelect");

languageSelect.addEventListener("change",()=>{

    monaco.editor.setModelLanguage(
        editor.getModel(),
        languageSelect.value
    );

    if(languageSelect.value === "javascript"){
        editor.setValue("// 開始撰寫 JavaScript 程式...\n");  
    }else if(languageSelect.value === "python"){
        editor.setValue("# 開始撰寫 Python 程式...\n");   
    }else if(languageSelect.value === "lua"){
        editor.setValue("-- 開始撰寫 Lua 程式...\n");
    }

    // move cursor to next line
    editor.setPosition({lineNumber:2, column:1});

    renderSnippetButtons();

});

const snippets = {

javascript:{

for:
`for(let i = 0; i < 10; i++){
    
}
`,

while:
`while(condition){
    
}
`,

if:
`if(condition){
    
}
`,

ifelse:
`if(condition){

}else{

}
`,

function:
`function myFunction(){

}
`,

class:
`class MyClass{

    constructor(){

    }

}
`
},

python:{
'input() 輸入':`a = input()
`,
'split() 切割':`.split()
`,
"print(f'') 輸出":`print(f'xx{?}')
`,
"print(f'') 輸出不換行":`print(f'xx{?}' , end="")
`,
'int() 轉數字':`int(?)`,
'abs() 絕對值':`abs(?)`,
'len() 長度':`len(?)`,
'?=[] 建立清單':`? = []
`,
'?.append(?) 添加元素':`?.append(?)
`,
'---------':``,
for:
`for i in range(10):
pass
`,
'for 每一個':`
for item in ?:
    pass
`,    
while:
`while condition:
    pass
`,

if:
`if condition:
    pass
`,

ifelse:
`if condition:
    pass
else:
    pass
`,

function:
`def my_function():
    pass
`,

class:
`class MyClass:

    def __init__(self):
        pass
`
},

lua:{

for:
`for i = 1, 10 do

end
`,

while:
`while i>0 do

end
`,

if:
`if a==1 then

end
`,

ifelse:
`if a==1 then

else

end
`,

function:
`function myFunction()

end
`,
print:
`print("hi")
`,
'Player.moveForward()':
`Player.moveForward()
`,
'Player.turnLeft()':
`Player.turnLeft()
`,
'Player.turnRight()':
`Player.turnRight()
`,
'Player.interact() 互動':
`Player.interact()
`,
'Player.lookAhead() 偵測前方':
`Player.lookAhead()
`,
'?.IsBlocked==?':
`?.IsBlocked==?`,
'?.Object==?':
`?.Object==?`,
'?.Floor==?':
`?.Floor==?`,
'?.Position==?':
`?.Position==?`,
'✽ Lilacs':
`'Lilacs'`,
'🍄 Yellow Mushrooms':
`'Yellow Mushrooms'`,
}

};

function insertAtCursor(text){

    const selection = editor.getSelection();

    editor.executeEdits("",[
        {
            range:selection,
            text:text,
            forceMoveMarkers:true
        }
    ]);

    editor.focus();
}

const snippetLabels = {
    for:"for 重複",
    while:"while 重複",
    if:"if ..",
    ifelse:"if .. else .."
};

// 分類映射
const categoryMap = {
    // 程式控制
    for: 'flow',
    while: 'flow',
    if: 'flow',
    ifelse: 'flow',
    // 常用函式功能
    input: 'func',
    split: 'func',
    print: 'func',
    function: 'func',
    class: 'func',
    def: 'func',
    append: 'func',
    len: 'func',
    'int(': 'func',
    abs: 'func',
    // 其他
    Player:'data',
    Object:'data',
    Floor:'data',
    Position:'data',
    isBlocked:'data',
    Lilacs:'data',
    Mushroom:'data'
};

function getCategoryForSnippet(key, lang) {
    // 先檢查 key 是否在分類映射中
    for (let mapKey in categoryMap) {
        if (key.includes(mapKey)) {
            return categoryMap[mapKey];
        }
    }
        
    return 'all';
}

function renderSnippetButtons(){

    const lang = languageSelect.value;
    const langSnippets = snippets[lang];
    
    // 清空所有 tab 內容
    document.getElementById('tab-all').innerHTML = '';
    document.getElementById('tab-flow').innerHTML = '';
    document.getElementById('tab-func').innerHTML = '';
    document.getElementById('tab-data').innerHTML = '';

    for(const type in langSnippets){

        const btn = document.createElement("button");
        btn.className = "snippet-btn";
        btn.dataset.type = type;
        btn.textContent = snippetLabels[type] || type;

        //btn.addEventListener("click",()=>{
          //  insertAtCursor(langSnippets[type]);
        //});

        // 確定分類
        const category = getCategoryForSnippet(type, lang);
        
        // 添加到 "全部" tab
        let clonedBtn = btn.cloneNode(true);
        clonedBtn.addEventListener("click",()=>{
            insertAtCursor(langSnippets[type]);
        });
        document.getElementById('tab-all').appendChild(clonedBtn);
        
        // 添加到對應分類 tab
        if (category !== 'all') {
            clonedBtn = btn.cloneNode(true);
            clonedBtn.addEventListener("click",()=>{
                insertAtCursor(langSnippets[type]);
            });
            document.getElementById(`tab-${category}`).appendChild(clonedBtn);
        }

    }

}

// Tab 切換事件
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
        // 移除所有 active 狀態
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
        
        // 添加 active 狀態
        tab.classList.add('active');
        const category = tab.dataset.category;
        document.getElementById(`tab-${category}`).classList.add('active');
    });
});

renderSnippetButtons();

document
.getElementById("copyBtn")
.addEventListener("click",async()=>{

    try{

        await navigator.clipboard.writeText(
            editor.getValue()
        );

        const btn =
            document.getElementById("copyBtn");

        btn.textContent="✅ 已複製";

        setTimeout(()=>{
            btn.textContent=
            "📋 複製全部程式碼";
        },1500);

    }catch(err){

        alert("複製失敗");

    }

});

document
.getElementById("downloadBtn")
.addEventListener("click",()=>{

    const lang = languageSelect.value;

    let ext = "txt";

    if(lang==="javascript") ext="js";
    if(lang==="python") ext="py";
    if(lang==="lua") ext="lua";

    const blob = new Blob(
        [editor.getValue()],
        {type:"text/plain"}
    );

    const a =
        document.createElement("a");

    a.href =
        URL.createObjectURL(blob);

    a.download =
        "code."+ext;

    a.click();

});

</script>

</body>
</html>
